<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scout Field Guide</title>
    
    <style>
        /* Loading your actual custom Bobby Jones font files from your GitHub repository */
        @font-face {
            font-family: 'Bobby Jones Soft Regular';
            src: url('BobbyJonesSoft-Regular.otf') format('opentype'),
                 url('BobbyJonesSoft-Regular.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
        }

        @font-face {
            font-family: 'Bobby Jones Soft Outline';
            src: url('BobbyJonesSoft-Outline.otf') format('opentype'),
                 url('BobbyJonesSoft-Outline.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
        }

        /* Reset and viewport lock */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html, body {
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            background-color: #0d0d0d;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* The master 2160x1920 canvas */
        .stage {
            position: relative;
            width: 2160px;
            height: 1920px;
            display: flex;
            transform-origin: center;
            box-shadow: 0 50px 100px rgba(0,0,0,0.85);
            background: #000;
        }

        /* LEFT SIDE: The Dirt Background */
        .left-environment {
            width: 1080px;
            height: 1920px;
            background-image: url('dirt.jpg');
            background-size: cover;
            background-position: center;
            background-color: #8a5a36;
            position: relative;
        }

        /* The physical paper fold-out layer peeking from behind the cover */
        .paper-fold-depth {
            position: absolute;
            top: 0;
            right: 0;
            width: 110px;
            height: 100%;
            background: #fcfbf7;
            box-shadow: -10px 0 30px rgba(0, 0, 0, 0.4);
            z-index: 2;
        }

        /* RIGHT SIDE: The Cover Page */
        .right-cover {
            width: 1080px;
            height: 1920px;
            background-color: #d0cdc1; /* Cream page tone from your design */
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: 160px 100px 100px 100px;
            z-index: 3;
            box-shadow: -15px 0 45px rgba(0, 0, 0, 0.2);
        }

        /* Subtle spine fold shadow */
        .spine-fold-line {
            position: absolute;
            left: 0;
            top: 0;
            width: 1px;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.25);
        }

        /* Cover Content Layout */
        .cover-content {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        /* Logo Area */
        .logo-container {
            width: 800px;
            height: 220px;
            margin-bottom: 25px;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .logo-container img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            display: block;
        }

        /* FIELD NOTES FOR THE TALENT TRACKER Subtitle */
        .subtitle {
            font-family: 'Bobby Jones Soft Regular', sans-serif;
            font-size: 32px;
            color: #1a1a1a;
            text-transform: uppercase;
            letter-spacing: 0.02em;
            margin-bottom: 45px;
        }

        /* Reconstructing your physical 3D stacked text look for your name */
        .author-container {
            position: relative;
            width: 100%;
            height: 60px;
            margin-bottom: 70px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* The background shadow/outline layers of the 3D stack */
        .author-shadow-layer {
            position: absolute;
            font-family: 'Bobby Jones Soft Outline', sans-serif;
            font-size: 44px;
            color: #111215;
            text-transform: uppercase;
        }

        /* The offset values mimicking your exact vector stacking */
        .offset-5 { transform: translate(5px, 5px); }
        .offset-4 { transform: translate(4px, 4px); }
        .offset-3 { transform: translate(3px, 3px); }
        .offset-2 { transform: translate(2px, 2px); }
        .offset-1 { transform: translate(1px, 1px); }

        /* The main front-facing teal text layer */
        .author-front-layer {
            position: absolute;
            font-family: 'Bobby Jones Soft Regular', sans-serif;
            font-size: 44px;
            color: #4da6c6; /* Teal face color */
            text-transform: uppercase;
            z-index: 10;
        }

        /* The Illustration Frame */
        .illustration-container {
            width: 750px;
            height: 950px;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: transparent;
            position: relative;
        }

        .illustration-container img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
        }

        /* Responsive scaling logic */
        @media (max-width: 768px) {
            .stage {
                width: 100vw;
                height: 100dvh;
                transform: none !important;
                box-shadow: none;
            }
            .left-environment {
                display: none;
            }
            .right-cover {
                width: 100vw;
                height: 100dvh;
                padding: 80px 30px;
            }
            .logo-container {
                width: 100%;
                height: auto;
                min-height: 120px;
            }
            .subtitle {
                font-size: 20px;
                margin-bottom: 25px;
            }
            .author-container {
                height: 40px;
                margin-bottom: 40px;
            }
            .author-front-layer, .author-shadow-layer {
                font-size: 30px;
            }
            .illustration-container {
                width: 100%;
                height: auto;
                max-height: 50vh;
            }
        }
    </style>
</head>
<body>

    <div class="stage" id="master-stage">
        
        <div class="left-environment">
            <div class="paper-fold-depth"></div>
        </div>

        <div class="right-cover">
            <div class="spine-fold-line"></div>
            
            <div class="cover-content">
                <div class="logo-container">
                    <img src="scout-logo.png" alt="SCOUT">
                </div>
                
                <p class="subtitle">Field Notes for the Talent Tracker</p>
                
                <div class="author-container">
                    <div class="author-shadow-layer offset-5">Justin Shubert</div>
                    <div class="author-shadow-layer offset-4">Justin Shubert</div>
                    <div class="author-shadow-layer offset-3">Justin Shubert</div>
                    <div class="author-shadow-layer offset-2">Justin Shubert</div>
                    <div class="author-shadow-layer offset-1">Justin Shubert</div>
                    <div class="author-front-layer">Justin Shubert</div>
                </div>
                
                <div class="illustration-container">
                    <img src="scout-sketch.png" alt="Scout Field Character Sketch">
                </div>
            </div>
            
        </div>

    </div>

    <script>
        // Handle page scaling to fit standard desktops and high-res screens
        function handleViewportScaling() {
            const stage = document.getElementById('master-stage');
            const targetWidth = 2160;
            const targetHeight = 1920;
            
            const windowWidth = window.innerWidth;
            const windowHeight = window.innerHeight;
            
            if (windowWidth > 768) {
                const scaleX = windowWidth / targetWidth;
                const scaleY = windowHeight / targetHeight;
                const scale = Math.min(scaleX, scaleY) * 0.96;
                
                stage.style.transform = `scale(${scale})`;
            } else {
                stage.style.transform = 'none';
            }
        }

        window.addEventListener('resize', handleViewportScaling);
        window.addEventListener('DOMContentLoaded', handleViewportScaling);
    </script>
</body>
</html>
