<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scout Field Guide</title>
    <style>
        /* Reset and viewport lock */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html, body {
            height: 100vh;
            width: 100vw;
            overflow: hidden; /* No scrolling */
            background-color: #0d0d0d;
            font-family: system-ui, -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Ambient Outer Stage (Desktop View Only) */
        .stage {
            position: relative;
            width: 2160px;
            height: 1920px;
            display: flex;
            transform-origin: center;
            box-shadow: 0 50px 100px rgba(0,0,0,0.8);
            border-radius: 4px;
            overflow: hidden;
        }

        /* LEFT SIDE: The Camping Dirt Environment */
        .left-environment {
            width: 1080px;
            height: 1920px;
            background-image: url('dirt.jpg'); /* Your custom dirt texture asset */
            background-size: cover;
            background-position: center;
            position: relative;
        }

        /* The white paper/pages folder physical depth effect peeking out under the cover */
        .paper-fold-depth {
            position: absolute;
            top: 60px;
            right: 0;
            width: 150px;
            height: 1800px;
            background: #fffdf5;
            box-shadow: -15px 0 30px rgba(0, 0, 0, 0.3);
            border-radius: 4px 0 0 4px;
            z-index: 2;
        }

        /* RIGHT SIDE: The Main Book Cover Page */
        .right-cover {
            width: 1080px;
            height: 1920px;
            background-color: #dcd9cd; /* The precise warm vintage gray-cream page color */
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: 220px 80px 120px 80px;
            border-left: 1px solid rgba(0, 0, 0, 0.15); /* Spine crease seam */
            z-index: 3;
            box-shadow: -10px 0 40px rgba(0, 0, 0, 0.15);
        }

        /* Spine shadow binding strip */
        .book-spine-binding {
            position: absolute;
            left: 0;
            top: 0;
            width: 12px;
            height: 100%;
            background: linear-gradient(to right, rgba(0,0,0,0.2), rgba(0,0,0,0.05) 50%, rgba(0,0,0,0));
        }

        /* Cover Content Layout */
        .cover-content {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        /* Logo/Header Group */
        .logo-container {
            width: 680px;
            margin-bottom: 20px;
        }

        .logo-container img {
            width: 100%;
            height: auto;
            display: block;
        }

        .subtitle {
            font-size: 26px;
            font-weight: 800;
            color: #0d0d0d;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-bottom: 50px;
            font-family: system-ui, -apple-system, sans-serif;
        }

        .author-tag {
            font-family: "Courier New", Courier, monospace;
            font-size: 32px;
            font-weight: 900;
            color: #1a425a; /* Custom dark teal-blue tone */
            text-transform: uppercase;
            letter-spacing: 0.02em;
            margin-bottom: 70px;
        }

        /* Illustration Frame Container */
        .illustration-container {
            width: 780px;
            height: 980px;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .illustration-container img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        /* Responsive Scaling Engine (Desktop Viewports) */
        @media (max-width: 768px) {
            .stage {
                width: 100vw;
                height: 100dvh;
                transform: none !important;
                box-shadow: none;
                border-radius: 0;
            }
            .left-environment {
                display: none; /* Hide the dirt and background stage on mobile */
            }
            .right-cover {
                width: 100vw;
                height: 100dvh;
                padding: 100px 40px;
            }
            .logo-container {
                width: 100%;
            }
            .illustration-container {
                width: 100%;
                height: auto;
                max-height: 55vh;
            }
        }
    </style>
</head>
<body>

    <div class="stage" id="master-stage">
        
        <div class="left-environment">
            <div class="paper-fold-depth"></div>
        </div>

        <div class="right-cover">
            <div class="book-spine-binding"></div>
            
            <div class="cover-content">
                <div class="logo-container">
                    <img src="scout-logo.png" alt="SCOUT">
                </div>
                
                <p class="subtitle">Field Notes for the Talent Tracker</p>
                
                <div class="author-tag">Justin Shubert</div>
                
                <div class="illustration-container">
                    <img src="scout-sketch.png" alt="Scout Field Character Sketch">
                </div>
            </div>
            
        </div>

    </div>

    <script>
        // Scales the 2160x1920 viewport cleanly onto smaller laptop screens
        function handleViewportScaling() {
            const stage = document.getElementById('master-stage');
            const targetWidth = 2160;
            const targetHeight = 1920;
            
            const windowWidth = window.innerWidth;
            const windowHeight = window.innerHeight;
            
            if (windowWidth > 768) {
                const scaleX = windowWidth / targetWidth;
                const scaleY = windowHeight / targetHeight;
                // Leave a tiny gap around the edge to see the stage breathing room
                const scale = Math.min(scaleX, scaleY) * 0.96;
                
                stage.style.transform = `scale(${scale})`;
            } else {
                stage.style.transform = 'none';
            }
        }

        window.addEventListener('resize', handleViewportScaling);
        window.addEventListener('DOMContentLoaded', handleViewportScaling);
    </script>
</body>
</html>
