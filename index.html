<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scout Field Guide</title>
    <style>
        /* Reset and viewport lock */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html, body {
            height: 100vh;
            width: 100vw;
            overflow: hidden; /* No scrolling */
            background-color: #0d0d0d;
            font-family: system-ui, -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* The master 2160x1920 canvas */
        .stage {
            position: relative;
            width: 2160px;
            height: 1920px;
            display: flex;
            transform-origin: center;
            box-shadow: 0 50px 100px rgba(0,0,0,0.85);
            background: #000;
        }

        /* LEFT SIDE: The Dirt Background */
        .left-environment {
            width: 1080px;
            height: 1920px;
            background-image: url('dirt.jpg');
            background-size: cover;
            background-position: center;
            background-color: #8a5a36; /* Fallback color */
            position: relative;
        }

        /* The physical paper fold-out layer peeking from behind the cover */
        .paper-fold-depth {
            position: absolute;
            top: 0;
            right: 0;
            width: 110px;
            height: 100%;
            background: #fcfbf7;
            box-shadow: -10px 0 30px rgba(0, 0, 0, 0.4);
            z-index: 2;
        }

        /* RIGHT SIDE: The Cover Page */
        .right-cover {
            width: 1080px;
            height: 1920px;
            background-color: #d0cdc1; /* The precise warm cream tone */
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: 180px 100px 100px 100px;
            z-index: 3;
            box-shadow: -15px 0 45px rgba(0, 0, 0, 0.2);
        }

        /* Subtle dark seam line at the spine fold */
        .spine-fold-line {
            position: absolute;
            left: 0;
            top: 0;
            width: 1px;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.25);
        }

        /* Cover Content Layout */
        .cover-content {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        /* Logo Area */
        .logo-container {
            width: 800px;
            height: 220px;
            margin-bottom: 30px;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .logo-container img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            display: block;
        }

        /* HTML/CSS Fallback for the "SCOUT" logo if the image breaks */
        .logo-fallback {
            font-size: 140px;
            font-weight: 900;
            color: #e5a93b; /* Warm gold/yellow */
            text-transform: uppercase;
            letter-spacing: -0.03em;
            /* Black outline and drop shadow matching your vector */
            -webkit-text-stroke: 4px #2b2c30;
            text-shadow: 8px 8px 0px #2b2c30;
            font-family: 'Arial Black', Impact, sans-serif;
        }

        .subtitle {
            font-size: 28px;
            font-weight: 800;
            color: #1c1c1c;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            margin-bottom: 50px;
        }

        .author-tag {
            font-family: "Courier New", Courier, monospace;
            font-size: 36px;
            font-weight: 900;
            color: #174059; /* Your dark blue/teal signature color */
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 80px;
        }

        /* The Illustration Frame */
        .illustration-container {
            width: 750px;
            height: 950px;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: transparent;
            position: relative;
        }

        .illustration-container img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        /* If the sketch image is missing, we draw a clean placeholder box so layout stays perfect */
        .illustration-placeholder {
            width: 100%;
            height: 100%;
            border: 3px dashed #888;
            background: rgba(0,0,0,0.02);
            display: flex;
            justify-content: center;
            align-items: center;
            color: #666;
            font-size: 24px;
            font-weight: bold;
        }

        /* Scaling logic for desktop vs full-screen mobile */
        @media (max-width: 768px) {
            .stage {
                width: 100vw;
                height: 100dvh;
                transform: none !important;
                box-shadow: none;
            }
            .left-environment {
                display: none; /* Hide dirt side on mobile */
            }
            .right-cover {
                width: 100vw;
                height: 100dvh;
                padding: 80px 30px;
            }
            .logo-container {
                width: 100%;
                height: auto;
                min-height: 120px;
            }
            .logo-fallback {
                font-size: 80px;
                -webkit-text-stroke: 2px #2b2c30;
                text-shadow: 4px 4px 0px #2b2c30;
            }
            .illustration-container {
                width: 100%;
                height: auto;
                max-height: 50vh;
            }
        }
    </style>
</head>
<body>

    <div class="stage" id="master-stage">
        
        <div class="left-environment">
            <div class="paper-fold-depth"></div>
        </div>

        <div class="right-cover">
            <div class="spine-fold-line"></div>
            
            <div class="cover-content">
                <div class="logo-container">
                    <img id="scout-logo-img" src="scout-logo.png" alt="SCOUT" onerror="handleLogoError()">
                    <div id="scout-logo-text" class="logo-fallback" style="display: none;">SCOUT</div>
                </div>
                
                <p class="subtitle">Field Notes for the Talent Tracker</p>
                
                <div class="author-tag">Justin Shubert</div>
                
                <div class="illustration-container">
                    <img id="scout-sketch-img" src="scout-sketch.png" alt="Scout Field Character Sketch" onerror="handleSketchError()">
                    <div id="scout-sketch-placeholder" class="illustration-placeholder" style="display: none;">
                        <span>[ Place scout-sketch.png here ]</span>
                    </div>
                </div>
            </div>
            
        </div>

    </div>

    <script>
        // If the logo image fails to load, swap in our custom CSS-styled title
        function handleLogoError() {
            document.getElementById('scout-logo-img').style.display = 'none';
            document.getElementById('scout-logo-text').style.display = 'block';
        }

        // If the sketch image fails to load, show a clean placeholder so layout doesn't break
        function handleSketchError() {
            document.getElementById('scout-sketch-img').style.display = 'none';
            document.getElementById('scout-sketch-placeholder').style.display = 'flex';
        }

        // Automatic scaling engine to keep the canvas perfectly fit to any browser size
        function handleViewportScaling() {
            const stage = document.getElementById('master-stage');
            const targetWidth = 2160;
            const targetHeight = 1920;
            
            const windowWidth = window.innerWidth;
            const windowHeight = window.innerHeight;
            
            if (windowWidth > 768) {
                const scaleX = windowWidth / targetWidth;
                const scaleY = windowHeight / targetHeight;
                const scale = Math.min(scaleX, scaleY) * 0.96;
                
                stage.style.transform = `scale(${scale})`;
            } else {
                stage.style.transform = 'none';
            }
        }

        window.addEventListener('resize', handleViewportScaling);
        window.addEventListener('DOMContentLoaded', handleViewportScaling);
    </script>
</body>
</html>
